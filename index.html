<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app">

        <header class="topbar">
            <div class="topbar-left">
                <div class="field-group">
                    <label for="customerName">Customer Name</label>
                    <input type="text" id="customerName" placeholder="Enter customer name">
                </div>

                <div class="field-group">
                    <label for="vehicleName">Vehicle Name</label>
                    <input type="text" id="vehicleName" placeholder="Enter vehicle name / model">
                </div>
            </div>

            <div class="topbar-center">
                <h1>Midnight Tuner</h1>
                <p>Owner - Axel Steel</p>
            </div>
        </header>

        <main class="container">

            <!-- LEFT COLUMN -->
            <section class="panel performance-col" id="col1">
                <div class="panel-title performance-title">Performance Upgrades</div>
            </section>

            <!-- MIDDLE COLUMN -->
            <section class="panel performance-col" id="col2">
                <div class="panel-title performance-title">Performance Upgrades</div>
            </section>

            <!-- RIGHT COLUMN -->
            <section class="panel right-panel">

                <div class="panel-title cosmetic-title">Cosmetic Upgrades</div>

                <div class="cosmetic-form">
                    <input
                        type="text"
                        id="cosmeticName"
                        placeholder="Enter cosmetic name">

                    <input
                        type="number"
                        id="cosmeticPrice"
                        placeholder="Price ($)">

                    <button onclick="addCosmeticUpgrade()">ADD</button>
                </div>

                <div id="cosmeticList" class="cosmetic-list"></div>

                <div class="discount-box">
                    <div class="panel-title discount-title">Discount</div>
                    <select id="discount" onchange="calculateTotal()">
                        <option value="0">No Discount (0%)</option>
                        <option value="10">10% Off</option>
                        <option value="15">15% Off</option>
                        <option value="20">20% Off</option>
                        <option value="25">25% Off</option>
                    </select>
                </div>

                <div class="totals-box">
                    <div class="total-row">
                        <span>Subtotal</span>
                        <span id="subtotalAmount">$0.00</span>
                    </div>

                    <div class="total-row labor-row">
                        <span>Labor Total</span>
                        <span id="laborTotalAmount">$0.00</span>
                    </div>

                    <div class="labor-toggle">
                        <label>
                            <input
                                type="checkbox"
                                id="removeLabor"
                                onchange="calculateTotal()"
                            >
                            Remove Labor From Final Total
                        </label>
                    </div>

                    <div class="total-row">
                        <span>Discount</span>
                        <span id="discountValue" class="discount-red">$0.00</span>
                    </div>

                    <div class="final-total">
                        <span>FINAL TOTAL</span>
                        <span id="finalTotalAmount" class="total-green">$0.00</span>
                    </div>
                </div>

                <div class="shop-banner-box">
                    <img
                        src="midnight-banner.png"
                        alt="Midnight Tuners Banner"
                        class="shop-banner"
                    >
                </div>

            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
